name: ExamOracle CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check formatting (Lint)
      run: npm run lint

    - name: Build Next.js app
      run: npm run build
      env:
        # Provide a dummy key just so the build passes if lint/build requires it
        GEMINI_API_KEY: "dummy-key-for-ci"
